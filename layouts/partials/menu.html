<nav class="menu">
  <div class="menu__inner menu__inner--desktop">
    {{ range .Site.Menus.main }}
      <li style="list-style:none; display:inline-block; margin-right:20px;">
        <a href="{{ .URL }}"
           class="nav-link {{ if or (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }}nav-active{{ end }}"
           style="text-decoration:none;">
          {{ .Name }}
        </a>
      </li>
    {{ end }}
  </div>
</nav>
