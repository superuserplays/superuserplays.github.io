baseURL = "https://superuserplays.github.io/"
locale = "en-us"
title = "superuserplays"
theme = "github.com/panr/hugo-theme-terminal"
paginate = 5

[module]
  [[module.imports]]
    path = "github.com/panr/hugo-theme-terminal"

[params]
  contentTypeName = "posts"
  themeColor = "blue"
  showMenuItems = 3
  fullWidthTheme = false
  centerTheme = false
  subtitle = "// game reviews & playthroughs"
  favicon = "favicon.png"

[menu]
  [[menu.main]]
    identifier = "reviews"
    name = "reviews"
    url = "/reviews"
    weight = 10
  [[menu.main]]
    identifier = "playthroughs"
    name = "playthroughs"
    url = "/playthroughs"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "about"
    url = "/about"
    weight = 30
